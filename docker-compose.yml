version: '3.8'

services:
  # ─── MongoDB ────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: webtv-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - webtv-network

  # ─── Backend API ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webtv-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/webtv
      - JWT_SECRET=webtv_digital_signage_secret_2024
      - JWT_EXPIRES_IN=24h
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    depends_on:
      - mongodb
    networks:
      - webtv-network

  # ─── Frontend (Nginx) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webtv-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - webtv-network

volumes:
  mongodb_data:
    driver: local

networks:
  webtv-network:
    driver: bridge
